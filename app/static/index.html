<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EC20 Manager</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><b>V</b><span>EC20<span>Hive</span></span></div>
    <nav>
      <button disabled><i>▦</i>仪表盘</button>
      <button class="active"><i>▯</i>设备管理</button>
      <button disabled><i>◎</i>代理中心</button>
      <button disabled><i>✉</i>短信中心</button>
      <button disabled><i>▤</i>实时日志</button>
      <button disabled><i>⚙</i>系统设置</button>
    </nav>
  </aside>

  <header class="topbar"><button class="menu">☰</button><span>EC20 / eSTK 设备中心</span><button class="theme">◔</button></header>
  <main>
    <div class="page-head">
      <div><h1>设备管理</h1><p>查看设备信息、编辑配置、执行 AT 指令</p></div>
      <div class="actions"><button id="refreshButton" class="light">↻ 刷新</button><button id="scanButton" class="light">◌ 重新扫描</button><button id="addButton">＋ 添加设备</button></div>
    </div>

    <div class="workspace">
      <section class="device-browser card">
        <input id="searchInput" placeholder="搜索设备 / ICCID / IMEI / 网卡">
        <div class="filters"><select><option>全部状态</option></select><select><option>排序：名称</option></select></div>
        <div id="deviceList" class="device-list"></div>
      </section>

      <section class="device-main">
        <div id="deviceBanner" class="device-banner card empty"><span class="logo">V</span><div><h2>等待选择设备</h2><p>扫描或添加一台 EC20 设备</p></div></div>
        <div class="detail card">
          <div class="tabs">
            <button class="active" data-tab="overview">概览</button>
            <button data-tab="esim">eSIM</button>
            <button data-tab="at">AT 终端</button>
            <button data-tab="ussd">USSD 终端</button>
            <button data-tab="config">配置</button>
          </div>
          <div id="overview" class="tab active">
            <div class="title-row"><div class="section-icon">▯</div><div><h3>设备概览</h3><p>EC20 模组、SIM 卡与蜂窝网络状态</p></div></div>
            <div id="overviewGrid" class="overview-grid"><div class="empty-state">请先选择设备</div></div>
          </div>
          <div id="esim" class="tab">
            <div class="title-row"><div class="section-icon">E</div><div><h3>eSTK / eSIM</h3><p>通过 AT+CSIM 与卡片交换 APDU</p></div></div>
            <form id="apduForm" class="terminal-form"><input id="apduInput" required placeholder="例如 00A4040000"><button>发送 APDU</button><pre id="apduResult">等待指令</pre></form>
          </div>
          <div id="at" class="tab">
            <div class="title-row"><div class="section-icon">AT</div><div><h3>AT 终端</h3><p>向当前设备发送 AT 指令</p></div></div>
            <form id="atForm" class="terminal-form"><input id="atInput" required value="AT"><button>执行指令</button><pre id="atResult">等待指令</pre></form>
          </div>
          <div id="ussd" class="tab"><div class="empty-state">USSD 终端将在后续版本开放</div></div>
          <div id="config" class="tab">
            <div class="config-head"><div class="title-row"><div class="section-icon">⌁</div><div><h3>设备配置</h3><p>配置保存在数据目录中</p></div></div><div><button id="deleteButton" class="danger">删除设备</button><button id="saveButton">保存配置</button></div></div>
            <form id="configForm" class="config-grid">
              <label>ID<input name="id" required></label><label>名称<input name="name" placeholder="显示名称"></label>
              <label>IMEI 绑定<input name="imei" readonly></label><label>USB 路径<input name="usb_path" readonly></label>
              <label>网卡接口<input name="network_interface"></label><label>AT 端口<input name="at_port" required></label>
              <label>控制设备<input name="control_device"></label><label>APN（可选）<input name="apn" placeholder="留空自动识别"></label>
              <div class="setting"><div><b>设备运行模式</b><small>AT=传统串口 / QMI=纯 QMI</small></div><select name="mode"><option>AT</option><option>QMI</option></select></div>
              <label class="setting"><div><b>开启网络</b><small>通过 QMI 控制网络开启</small></div><input name="network_enabled" type="checkbox"></label>
              <label class="setting"><div><b>VoWiFi</b><small>开启后设备将进入飞行模式</small></div><input name="vowifi" type="checkbox"></label>
            </form>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box"><button id="closeModal" class="close">×</button><h2>添加设备配置</h2><p>选择扫描到的设备，系统会自动填充 AT 端口与识别信息。</p><div id="scanResults"></div></div>
  </div>
  <div id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
